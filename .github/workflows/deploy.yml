name: Deploy

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to run the deploy pipeline for
        required: true
        type: string

concurrency:
  group: deploy-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  deployments: write
  actions: read

jobs:
  setup:
    name: Validate and build matrix
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      services: ${{ steps.validate.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      approval_enabled: ${{ steps.validate.outputs.approval_enabled }}
      rollback_enabled: ${{ steps.validate.outputs.rollback_enabled }}
      rollback_automatic: ${{ steps.validate.outputs.rollback_automatic }}
      healthcheck_enabled: ${{ steps.validate.outputs.healthcheck_enabled }}
      notify_on_success: ${{ steps.validate.outputs.notify_on_success }}
      changelog_enabled: ${{ steps.validate.outputs.changelog_enabled }}
      reason: ${{ steps.validate.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Sync labels from issue form
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: bash .github/scripts/sync-issue-from-form.sh

      - name: Validate deployment issue
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: bash .github/scripts/lib/matrix.sh validate

      - name: Build deployment matrix
        id: matrix
        if: steps.validate.outputs.valid == 'true'
        run: |
          matrix_json=$(bash .github/scripts/lib/matrix.sh matrix "${{ steps.validate.outputs.services }}")
          {
            echo "matrix<<EOF"
            echo "$matrix_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  wait-approval:
    name: Wait for approval
    needs: setup
    if: needs.setup.outputs.valid == 'true' && needs.setup.outputs.approval_enabled == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
    outputs:
      approved: ${{ steps.approval.outputs.approved }}
      approver: ${{ steps.approval.outputs.approver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Request approval
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          source .github/scripts/lib/config.sh
          users=$(cfg_approval_users | sed 's/^/@/' | paste -sd ', ' -)
          source .github/scripts/lib/audit.sh
          audit_waiting_approval "$users"

      - name: Capture approval comment timestamp
        id: approval_since
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/gh-issue.sh
          since="$(issue_latest_comment_created_at "Waiting for approval")"
          if [[ -z "$since" ]]; then
            echo "::error::Could not find approval comment timestamp on issue." >&2
            exit 1
          fi
          echo "since=${since}" >> "$GITHUB_OUTPUT"

      - name: Poll reactions
        id: approval
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          APPROVAL_SINCE_ISO: ${{ steps.approval_since.outputs.since }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/gh-issue.sh
          source .github/scripts/lib/reactions.sh
          source .github/scripts/lib/audit.sh

          set +e
          result=$(wait_for_approval)
          code=$?
          set -e

          if [[ "$result" == approved:* ]]; then
            approver="${result#approved:}"
            issue_remove_user_reaction "$approver" "rocket"
            audit_approved "$approver"
            echo "approved=true" >> "$GITHUB_OUTPUT"
            echo "approver=${approver}" >> "$GITHUB_OUTPUT"
          elif [[ "$result" == rejected:* ]]; then
            rejecter="${result#rejected:}"
            audit_rejected "$rejecter"
            issue_add_label "deploy:rejected"
            issue_close
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            audit_failure "timeout waiting for approval"
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit "$code"
          fi

  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [setup, wait-approval]
    if: |
      needs.setup.outputs.valid == 'true' &&
      (needs.setup.outputs.approval_enabled != 'true' || needs.wait-approval.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      # Map secrets referenced in deploy.config.yaml to the job environment.
      # Extend this block when your config references additional secret names.
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USERNAME: ${{ secrets.PRODUCTION_SSH_USERNAME }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_SSH_PASSPHRASE: ${{ secrets.PRODUCTION_SSH_PASSPHRASE }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit deploy start
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          source .github/scripts/lib/audit.sh
          audit_deploying "${{ matrix.service }}" "${{ matrix.image }}"

      - name: Deploy service
        id: deploy
        uses: ./actions/deploy
        with:
          strategy: ${{ matrix.strategy }}
          service: ${{ matrix.service }}
          image: ${{ matrix.image }}
          config: ${{ matrix.config }}

      - name: Record deploy state
        if: steps.deploy.outputs.deploy_status == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          PREVIOUS_REF: ${{ steps.deploy.outputs.previous_ref }}
          DEPLOYED_REF: ${{ steps.deploy.outputs.deployed_ref }}
        run: |
          bash .github/scripts/record-state.sh "${{ matrix.service }}"

      - name: Upload deploy state artifact
        if: always() && steps.deploy.outputs.deploy_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-state-${{ matrix.service }}
          path: /tmp/deploy-state/
          if-no-files-found: ignore

      - name: Record deploy outcome
        if: always()
        run: |
          mkdir -p /tmp/deploy-outcomes
          if [[ "${{ steps.deploy.outputs.deploy_status }}" == "success" ]]; then
            echo "success" > "/tmp/deploy-outcomes/deploy-outcome-${{ matrix.service }}.txt"
          else
            echo "failure" > "/tmp/deploy-outcomes/deploy-outcome-${{ matrix.service }}.txt"
          fi

      - name: Upload deploy outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-outcome-${{ matrix.service }}
          path: /tmp/deploy-outcomes/deploy-outcome-${{ matrix.service }}.txt
          if-no-files-found: warn

      - name: Capture deploy failure detail
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          FAILURE_DETAIL: ${{ steps.deploy.outputs.failure_detail }}
          SERVICE: ${{ matrix.service }}
        run: |
          mkdir -p /tmp/failure-logs
          detail="${FAILURE_DETAIL:-Deploy step failed for ${SERVICE}}"
          printf '%s' "$detail" > "/tmp/failure-logs/${SERVICE}.txt"
          source .github/scripts/lib/audit.sh
          audit_failure_detected "${SERVICE}" "deploy failed" "$detail"

      - name: Upload failure log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-${{ matrix.service }}
          path: /tmp/failure-logs/${{ matrix.service }}.txt
          if-no-files-found: warn

  deploy-summary:
    name: Summarize deploy outcomes
    needs: [setup, wait-approval, deploy]
    if: |
      always() &&
      needs.setup.outputs.valid == 'true' &&
      (needs.setup.outputs.approval_enabled != 'true' || needs.wait-approval.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      succeeded_services: ${{ steps.summary.outputs.succeeded_services }}
      failed_services: ${{ steps.summary.outputs.failed_services }}
      all_succeeded: ${{ steps.summary.outputs.all_succeeded }}
      any_failed: ${{ steps.summary.outputs.any_failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deploy outcomes
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-outcome-*
          merge-multiple: true
          path: /tmp/deploy-outcomes

      - name: Summarize outcomes
        id: summary
        run: |
          set -euo pipefail
          source .github/scripts/lib/deploy-outcomes.sh
          summarize_deploy_outcomes /tmp/deploy-outcomes "${{ needs.setup.outputs.services }}"

  healthcheck:
    name: Health check ${{ matrix.service }}
    needs: [setup, deploy, deploy-summary]
    if: |
      always() &&
      needs.setup.outputs.valid == 'true' &&
      needs.setup.outputs.healthcheck_enabled == 'true' &&
      (needs.setup.outputs.approval_enabled != 'true' || needs.wait-approval.result == 'success')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download deploy outcomes
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-outcome-*
          merge-multiple: true
          path: /tmp/deploy-outcomes

      - name: Skip health check (deploy failed)
        id: health
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/deploy-outcomes.sh
          source .github/scripts/lib/audit.sh

          deploy_outcome="$(deploy_outcome_for_service /tmp/deploy-outcomes "$SERVICE")"
          mkdir -p /tmp/health-outcomes

          if [[ "$deploy_outcome" != "success" ]]; then
            audit_healthcheck "$SERVICE" "SKIPPED" "deploy did not succeed"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "skipped" > "/tmp/health-outcomes/health-outcome-${SERVICE}.txt"
            exit 0
          fi

          bash .github/scripts/healthcheck.sh "$SERVICE"

      - name: Record health outcome
        if: always()
        run: |
          mkdir -p /tmp/health-outcomes
          status="${{ steps.health.outputs.status }}"
          if [[ -z "$status" ]]; then
            status="failure"
          fi
          echo "$status" > "/tmp/health-outcomes/health-outcome-${{ matrix.service }}.txt"

      - name: Fail on unhealthy service
        if: steps.health.outputs.status == 'failure'
        run: exit 1

      - name: Capture health check failure detail
        if: failure() && steps.health.outputs.status == 'failure'
        env:
          FAILURE_DETAIL: ${{ steps.health.outputs.failure_detail }}
          SERVICE: ${{ matrix.service }}
        run: |
          mkdir -p /tmp/failure-logs
          detail="${FAILURE_DETAIL:-Health check failed for ${SERVICE}}"
          printf '%s' "$detail" > "/tmp/failure-logs/${SERVICE}.txt"

      - name: Upload health outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-outcome-${{ matrix.service }}
          path: /tmp/health-outcomes/health-outcome-${{ matrix.service }}.txt
          if-no-files-found: warn

      - name: Upload failure log artifact
        if: failure() && steps.health.outputs.status == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-${{ matrix.service }}
          path: /tmp/failure-logs/${{ matrix.service }}.txt
          if-no-files-found: warn

  rollback-notify:
    name: Notify rollback triggered
    needs: [setup, deploy-summary, healthcheck]
    if: |
      always() &&
      needs.setup.outputs.valid == 'true' &&
      needs.setup.outputs.rollback_enabled == 'true' &&
      needs.setup.outputs.rollback_automatic == 'true' &&
      (
        needs.deploy-summary.outputs.any_failed == 'true' ||
        needs.healthcheck.result == 'failure'
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download failure logs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: failure-log-*
          merge-multiple: true
          path: /tmp/failure-logs

      - name: Post rollback triggered notification
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          SERVICES: ${{ needs.setup.outputs.services }}
          ANY_DEPLOY_FAILED: ${{ needs.deploy-summary.outputs.any_failed }}
          HEALTHCHECK_RESULT: ${{ needs.healthcheck.result }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/audit.sh
          source .github/scripts/lib/gh-issue.sh

          reason="deploy or health check failed"
          if [[ "$ANY_DEPLOY_FAILED" == "true" && "$HEALTHCHECK_RESULT" == "failure" ]]; then
            reason="deploy failed and health check failed"
          elif [[ "$ANY_DEPLOY_FAILED" == "true" ]]; then
            reason="deploy failed"
          elif [[ "$HEALTHCHECK_RESULT" == "failure" ]]; then
            reason="health check failed"
          fi

          mentions="$(issue_mentions)"
          failure_summary="$(bash .github/scripts/lib/failure-summary.sh /tmp/failure-logs)"
          audit_rollback_triggered "$reason" "$SERVICES" "$mentions" "$failure_summary"

  rollback:
    name: Rollback ${{ matrix.service }}
    needs: [setup, deploy-summary, healthcheck]
    if: |
      always() &&
      needs.setup.outputs.valid == 'true' &&
      needs.setup.outputs.rollback_enabled == 'true' &&
      needs.setup.outputs.rollback_automatic == 'true' &&
      (
        needs.deploy-summary.outputs.any_failed == 'true' ||
        needs.healthcheck.result == 'failure'
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USERNAME: ${{ secrets.PRODUCTION_SSH_USERNAME }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_SSH_PASSPHRASE: ${{ secrets.PRODUCTION_SSH_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download deploy and health outcomes
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-outcome-*|health-outcome-*
          merge-multiple: true
          path: /tmp/outcomes

      - name: Record rollback skipped
        id: needs_rollback
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/deploy-outcomes.sh
          source .github/scripts/lib/audit.sh

          mkdir -p /tmp/rollback-results
          if service_needs_rollback /tmp/outcomes /tmp/outcomes "$SERVICE"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "skipped" > "/tmp/rollback-results/rollback-result-${SERVICE}.txt"
            audit_rollback_skipped "$SERVICE" "service deployed successfully — no rollback needed"
          fi

      - name: Download deploy state
        if: steps.needs_rollback.outputs.needed == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-state-${{ matrix.service }}
          merge-multiple: true
          path: /tmp/deploy-state

      - name: Execute rollback
        id: rollback
        if: steps.needs_rollback.outputs.needed == 'true'
        run: |
          PREVIOUS_REF="unknown"
          DEPLOYED_REF="${{ matrix.image }}"
          if [[ -f "/tmp/deploy-state/${{ matrix.service }}.deployed" ]]; then
            DEPLOYED_REF=$(cat "/tmp/deploy-state/${{ matrix.service }}.deployed")
          fi
          if [[ -f "/tmp/deploy-state/${{ matrix.service }}.previous" ]]; then
            PREVIOUS_REF=$(cat "/tmp/deploy-state/${{ matrix.service }}.previous")
          fi
          bash .github/scripts/rollback.sh \
            "${{ matrix.service }}" \
            "$PREVIOUS_REF" \
            "deploy or health check failed" \
            "automatic" \
            "$DEPLOYED_REF"

      - name: Upload rollback result artifact
        if: always()
        run: |
          mkdir -p /tmp/rollback-results
          service="${{ matrix.service }}"
          if [[ "${{ steps.needs_rollback.outputs.needed }}" != "true" ]]; then
            echo "skipped" > "/tmp/rollback-results/rollback-result-${service}.txt"
          else
            status="${{ steps.rollback.outputs.rollback_status }}"
            if [[ -z "$status" ]]; then
              status="failure"
            fi
            echo "$status" > "/tmp/rollback-results/rollback-result-${service}.txt"
          fi

      - name: Save rollback result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-result-${{ matrix.service }}
          path: /tmp/rollback-results/rollback-result-${{ matrix.service }}.txt
          if-no-files-found: warn

  manual-rollback:
    name: Manual rollback monitor
    needs: [setup, deploy-summary, healthcheck]
    if: |
      needs.setup.outputs.valid == 'true' &&
      needs.setup.outputs.rollback_enabled == 'true' &&
      needs.deploy-summary.outputs.all_succeeded == 'true' &&
      (
        needs.setup.outputs.healthcheck_enabled != 'true' ||
        needs.healthcheck.result == 'success' ||
        needs.healthcheck.result == 'skipped'
      )
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USERNAME: ${{ secrets.PRODUCTION_SSH_USERNAME }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_SSH_PASSPHRASE: ${{ secrets.PRODUCTION_SSH_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download deploy state for rollback
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-state-${{ matrix.service }}
          merge-multiple: true
          path: /tmp/deploy-state

      - name: Check manual rollback reaction
        env:
          MANUAL_ROLLBACK_POLL_SECONDS: "300"
          POLL_INTERVAL_SECONDS: "30"
        run: |
          set -euo pipefail
          source .github/scripts/lib/reactions.sh

          deadline=$((SECONDS + MANUAL_ROLLBACK_POLL_SECONDS))
          while [[ $SECONDS -lt $deadline ]]; do
            if actor=$(check_manual_rollback); then
              PREVIOUS_REF="unknown"
              if [[ -f "/tmp/deploy-state/${{ matrix.service }}.previous" ]]; then
                PREVIOUS_REF=$(cat "/tmp/deploy-state/${{ matrix.service }}.previous")
              fi
              bash .github/scripts/rollback.sh "${{ matrix.service }}" "$PREVIOUS_REF" "manual rollback requested" "@${actor}"
              exit 0
            fi
            sleep "$POLL_INTERVAL_SECONDS"
          done
          echo "No manual rollback reaction detected within ${MANUAL_ROLLBACK_POLL_SECONDS}s"

  finalize:
    name: Finalize deployment
    needs: [setup, wait-approval, deploy, deploy-summary, healthcheck, rollback-notify, rollback]
    if: always() && needs.setup.outputs.valid == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Download outcome artifacts
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: deploy-outcome-*|health-outcome-*|failure-log-*|rollback-result-*
          merge-multiple: true
          path: /tmp/finalize-artifacts

      - name: Download deploy state for changelog
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: deploy-state-*
          merge-multiple: true
          path: /tmp/deploy-state

      - name: Build changelog
        id: changelog
        if: |
          needs.deploy-summary.outputs.all_succeeded == 'true' &&
          (
            needs.setup.outputs.healthcheck_enabled != 'true' ||
            needs.healthcheck.result == 'success' ||
            needs.healthcheck.result == 'skipped'
          )
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "${{ needs.setup.outputs.changelog_enabled }}" == "true" ]]; then
            bash .github/scripts/changelog.sh build /tmp/deploy-state
          else
            echo "changelog_url=" >> "$GITHUB_OUTPUT"
            echo "changelog_summary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Post final status
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          SERVICES: ${{ needs.setup.outputs.services }}
          NOTIFY_ON_SUCCESS: ${{ needs.setup.outputs.notify_on_success }}
          HEALTHCHECK_ENABLED: ${{ needs.setup.outputs.healthcheck_enabled }}
          ROLLBACK_ENABLED: ${{ needs.setup.outputs.rollback_enabled }}
          ROLLBACK_AUTOMATIC: ${{ needs.setup.outputs.rollback_automatic }}
          CHANGELOG_URL: ${{ steps.changelog.outputs.changelog_url }}
          CHANGELOG_SUMMARY: ${{ steps.changelog.outputs.changelog_summary }}
        run: |
          set -euo pipefail
          source .github/scripts/lib/audit.sh
          source .github/scripts/lib/gh-issue.sh
          source .github/scripts/lib/deploy-outcomes.sh

          summarize_pipeline_outcomes \
            /tmp/finalize-artifacts \
            /tmp/finalize-artifacts \
            "$SERVICES" \
            "$HEALTHCHECK_ENABLED"

          issue_number="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          mentions="$(issue_mentions)"
          failure_summary="$(bash .github/scripts/lib/failure-summary.sh /tmp/finalize-artifacts 2>/dev/null || true)"

          full_success=false
          if [[ -z "$deploy_failed" && -z "$health_failed" && -n "$deploy_succeeded" ]]; then
            full_success=true
          fi

          partial_deploy=false
          if [[ -n "$deploy_succeeded" && -n "$deploy_failed" ]]; then
            partial_deploy=true
          fi

          if [[ "$full_success" == "true" ]]; then
            if [[ "$NOTIFY_ON_SUCCESS" == "true" ]]; then
              audit_success_notify "$SERVICES" "$mentions" "$CHANGELOG_URL" "$CHANGELOG_SUMMARY"
            fi
            bash .github/scripts/changelog.sh record
            gh issue close "$issue_number"
            exit 0
          fi

          if [[ "$partial_deploy" == "true" ]]; then
            audit_partial_deploy "$deploy_succeeded" "$deploy_failed" "$health_failed" "$health_skipped"
          fi

          rollback_ran=false
          if [[ "$ROLLBACK_ENABLED" == "true" && "$ROLLBACK_AUTOMATIC" == "true" ]]; then
            if [[ -n "$deploy_failed" || -n "$health_failed" ]]; then
              rollback_ran=true
            fi
          fi

          if [[ "$rollback_ran" == "true" ]]; then
            rollback_failed=false
            rollback_partial=false
            rollback_all_restored=true
            service deploy_outcome rollback_outcome

            IFS=',' read -ra all_services <<< "$SERVICES"
            for service in "${all_services[@]}"; do
              [[ -z "$service" ]] && continue
              if ! service_needs_rollback /tmp/finalize-artifacts /tmp/finalize-artifacts "$service"; then
                continue
              fi
              rollback_outcome="$(rollback_outcome_for_service /tmp/finalize-artifacts "$service")"
              case "$rollback_outcome" in
                success) ;;
                skipped)
                  deploy_outcome="$(deploy_outcome_for_service /tmp/finalize-artifacts "$service")"
                  if [[ "$deploy_outcome" != "success" ]]; then
                    rollback_partial=true
                    rollback_all_restored=false
                  fi
                  ;;
                *)
                  rollback_failed=true
                  rollback_all_restored=false
                  ;;
              esac
            done

            if [[ "$rollback_all_restored" == "true" && -z "$deploy_succeeded" ]]; then
              audit_rollback_summary "restored" "$mentions" "$failure_summary"
              gh issue close "$issue_number"
              gh label create "deploy:rolled-back" --description "Deploy failed but environment was rolled back" --color "FBCA04" 2>/dev/null \
                || gh label edit "deploy:rolled-back" --description "Deploy failed but environment was rolled back" 2>/dev/null \
                || true
              gh issue edit "$issue_number" --add-label "deploy:rolled-back"
            elif [[ "$rollback_failed" == "true" ]]; then
              audit_rollback_summary "failed" "$mentions" "$failure_summary"
            else
              audit_rollback_summary "partial" "$mentions" "$failure_summary"
            fi
          elif [[ "$partial_deploy" != "true" ]]; then
            audit_failure "one or more services failed during deploy or health check"
          fi
