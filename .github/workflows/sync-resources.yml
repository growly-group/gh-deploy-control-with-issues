name: Sync Deploy Resources

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - deploy.config.yaml
      - .github/workflows/sync-resources.yml
      - .github/scripts/sync-resources.sh
      - .github/scripts/lib/config.sh

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync labels and issue types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Sync resources from config
        env:
          GH_TOKEN: ${{ github.token }}
          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/sync-resources.sh

      - name: Commit issue template
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/deploy.yml
          if git diff --staged --quiet; then
            echo "Issue template unchanged"
          else
            git commit -m "chore: sync deploy issue template from deploy.config.yaml"
            git push
          fi
