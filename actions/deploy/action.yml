name: Deploy service router
description: Routes deployment to the strategy-specific composite action.

inputs:
  strategy:
    description: Deploy strategy name (ssh-docker, cloudflare-pages, script)
    required: true
  service:
    description: Service name
    required: true
  image:
    description: Container image to deploy
    required: true
  config:
    description: JSON strategy config
    required: true

outputs:
  previous_ref:
    description: Image reference before deploy
    value: ${{ steps.script.outputs.previous_ref || steps.ssh.outputs.previous_ref || steps.cf.outputs.previous_ref }}
  deployed_ref:
    description: Image reference deployed
    value: ${{ steps.script.outputs.deployed_ref || steps.ssh.outputs.deployed_ref || steps.cf.outputs.deployed_ref }}
  deploy_status:
    description: success or failure
    value: ${{ steps.script.outputs.deploy_status || steps.ssh.outputs.deploy_status || steps.cf.outputs.deploy_status }}
  failure_detail:
    description: Error detail when deploy fails
    value: ${{ steps.script.outputs.failure_detail || steps.ssh.outputs.failure_detail || steps.cf.outputs.failure_detail }}

runs:
  using: composite
  steps:
    - name: Deploy via SSH + Docker
      if: inputs.strategy == 'ssh-docker'
      id: ssh
      continue-on-error: true
      uses: ./actions/deploy-ssh-docker
      with:
        service: ${{ inputs.service }}
        image: ${{ inputs.image }}
        config: ${{ inputs.config }}

    - name: Deploy to Cloudflare Pages
      if: inputs.strategy == 'cloudflare-pages'
      id: cf
      continue-on-error: true
      uses: ./actions/deploy-cloudflare-pages
      with:
        service: ${{ inputs.service }}
        image: ${{ inputs.image }}
        config: ${{ inputs.config }}

    - name: Deploy via script
      if: inputs.strategy == 'script'
      id: script
      continue-on-error: true
      uses: ./actions/deploy-script
      with:
        service: ${{ inputs.service }}
        image: ${{ inputs.image }}
        config: ${{ inputs.config }}

    - name: Verify deploy status
      if: always()
      shell: bash
      env:
        DEPLOY_STATUS: ${{ steps.script.outputs.deploy_status || steps.ssh.outputs.deploy_status || steps.cf.outputs.deploy_status }}
      run: |
        set -euo pipefail
        if [[ "${DEPLOY_STATUS}" == "failure" ]]; then
          exit 1
        fi
        if [[ -z "${DEPLOY_STATUS}" ]]; then
          echo "::error::No deploy strategy produced a status (strategy=${{ inputs.strategy }})"
          exit 1
        fi
