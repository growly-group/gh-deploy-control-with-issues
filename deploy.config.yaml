deployment:
  issue_type: Deploy
  # Fallback for user-owned repos (Issue Types are org-only via API).
  # Sync creates this label automatically; add it to deploy issues when Issue Type is unavailable.
  fallback_trigger_label: deploy

  approval:
    enabled: true
    users:
      - techlead
      - sre

  rollback:
    enabled: true
    automatic: true

  healthcheck:
    enabled: true
    endpoint: /health
    timeout: 300
    retries: 10
    interval: 15

  observability:
    include_failed_logs: true
    max_log_lines: 40
    max_log_chars: 3500
    notify_on_success: true
    changelog:
      enabled: true
      max_commits: 20
      state_variable: DEPLOY_LAST_GIT_SHA

services:
  frontend:
    image: ghcr.io/company/frontend
    strategy: cloudflare-pages
    config:
      project_name: my-app
      directory: apps/frontend/dist
    healthcheck:
      url: https://app.example.com/health

  backend:
    image: ghcr.io/company/backend
    strategy: ssh-docker
    config:
      ssh_host_secret: PRODUCTION_SSH_HOST
      ssh_user_secret: PRODUCTION_SSH_USERNAME
      ssh_key_secret: PRODUCTION_SSH_KEY
      ssh_port_var: PRODUCTION_SSH_PORT
      container_name: backend
    healthcheck:
      url: https://api.example.com/health

  worker:
    image: ghcr.io/company/worker
    strategy: script
    config:
      script: .github/deploy-scripts/worker.sh
    healthcheck:
      url: https://worker.example.com/health
